[[doc_mapping]]
  sources = ["src/**"]
  docs = ["README.md", "docs/"]

[llm]
  driver = "ollama"
  endpoint = "http://localhost:11434"
  model = "codestral:22b"
  api_key = ""
  [llm.options]
    max_tokens = 4096
    temperature = 0.0

[behavior]
  auto_fix = true
  block_on_false = true
  max_retries = 2

[audit]
  solana = false
  rpc_endpoint = ""
  keypair_path = ""
  program_id = ""
